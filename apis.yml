aid: attio
name: Attio
description: >-
  Attio is a modern, flexible, and data-driven customer relationship management
  (CRM) platform that lets revenue teams build a CRM around their unique data
  model with customizable objects, attributes, lists, and workflows. Attio
  syncs contacts and companies from email and calendar, enriches them with
  data, and powers reporting, sequences, and automations. The Attio REST API
  exposes full CRUD access to records, lists, objects, attributes, tasks,
  notes, threads, comments, and webhooks using Bearer token authentication
  and a public OpenAPI specification.
type: Index
